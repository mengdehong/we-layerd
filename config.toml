[general]
fps_limit = 30
restart_wine_on_exit = true
refind_window_on_capture_error = true
show_fps = true
fps_report_interval_secs = 2

[wine]
command = "wine"
wallpaper_exe = "/home/aromatic/.local/share/Steam/steamapps/common/wallpaper_engine/wallpaper64.exe"
args = [
  "-control", "openWallpaper",
  "-file", "/home/aromatic/.local/share/Steam/steamapps/workshop/content/431960/3299228616/project.json",
  "-playInWindow", "WE-DEBUG-WINDOW",
  "-width", "2560",
  "-height", "1600",
  "-x", "100",
  "-y", "100",
]

[capture]
wm_class_contains = "wallpaper64"
title_contains = "WE-DEBUG-WINDOW"

[capture.output_window_map]
